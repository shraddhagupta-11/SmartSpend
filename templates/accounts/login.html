{% extends "auth_base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-header">

            <div class="auth-icon">
                👋
            </div>

            <h1>
                Welcome Back
            </h1>

            <p>
                Sign in to continue managing your finances.
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="auth-btn"
            >
                Sign In
            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{% url 'register' %}">
                Create Account
            </a>

        </div>

    </div>

</div>

{% endblock %}
