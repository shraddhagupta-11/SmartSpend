{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <a
        href="{% url 'budget_list' %}"
        class="back-link"
    >
        ← Budgets
    </a>

    <div class="page-title">
        Delete Budget
    </div>

    <div class="page-subtitle">
        Review before removing this budget.
    </div>

</div>

<div class="delete-card">

    <div class="delete-icon">
        ⚠️
    </div>

    <h3>
        {{ budget.category }}
    </h3>

    <div class="delete-details">

        <p>
            Amount:
            <strong>
                ₹{{ budget.amount }}
            </strong>
        </p>

        <p>
            Month:
            <strong>
                {{ budget.budget_month|date:"F Y" }}
            </strong>
        </p>

    </div>

    <div class="delete-warning">

        This action cannot be undone.

    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="form-actions">

            <a
                href="{% url 'budget_list' %}"
                class="secondary-btn"
            >
                Cancel
            </a>

            <button
                type="submit"
                class="danger-btn"
            >
                Delete Budget
            </button>

        </div>

    </form>

</div>

{% endblock %}
