{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <a
        href="{% url 'goal_list' %}"
        class="back-link"
    >
        ← Goals
    </a>

    <div class="page-title">
        Goal
    </div>

    <div class="page-subtitle">
        Create or update a financial goal.
    </div>

</div>

<div class="form-wrapper">

    <div class="form-card">

        <form method="POST">

            {% csrf_token %}

            {% for field in form %}

            <div class="form-group">

                <label>
                    {{ field.label }}
                </label>

                {{ field }}

                {% if field.errors %}

                <div class="field-error">
                    {{ field.errors }}
                </div>

                {% endif %}

            </div>

            {% endfor %}

            <div class="form-actions">

                <a
                    href="{% url 'goal_list' %}"
                    class="secondary-btn"
                >
                    Cancel
                </a>

                <button
                    type="submit"
                    class="primary-btn"
                >
                    Save Goal
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
